<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elecciones La Paz 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --rojo:#C0392B;--amarillo:#F4C430;--negro:#0D0D0D;
  --gris-oscuro:#1A1A1A;--gris-medio:#2C2C2C;--gris-claro:#3D3D3D;
  --texto:#F0EDE8;--texto-dim:#999;--borde:rgba(255,255,255,0.08);
  --font-display:'Syne',sans-serif;--font-body:'IBM Plex Sans',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--negro);color:var(--texto);font-family:var(--font-body);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{border-bottom:3px solid var(--rojo);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0;}
.ht{font-family:var(--font-display);font-size:clamp(13px,2vw,21px);font-weight:800;letter-spacing:-.5px;line-height:1.1;}
.ht span{color:var(--amarillo);}
.hm{font-family:var(--font-mono);font-size:10px;color:var(--texto-dim);text-align:right;line-height:1.7;}
.hm strong{color:var(--amarillo);}

.layout{display:flex;flex:1;overflow:hidden;}

nav{width:185px;min-width:185px;border-right:1px solid var(--borde);padding:14px 0;overflow-y:auto;flex-shrink:0;}
nav h3{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--texto-dim);padding:0 13px 9px;text-transform:uppercase;}
.nb{display:block;width:100%;padding:9px 13px;background:none;border:none;border-left:3px solid transparent;color:var(--texto-dim);font-family:var(--font-body);font-size:12px;text-align:left;cursor:pointer;transition:all .15s;}
.nb:hover{color:var(--texto);background:rgba(255,255,255,.04);}
.nb.active{color:var(--amarillo);border-left-color:var(--amarillo);background:rgba(244,196,48,.06);font-weight:500;}

main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.tabs{display:flex;border-bottom:1px solid var(--borde);padding:0 16px;flex-shrink:0;}
.tb{background:none;border:none;color:var(--texto-dim);font-family:var(--font-mono);font-size:11px;padding:10px 13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tb:hover{color:var(--texto);}
.tb.active{color:var(--amarillo);border-bottom-color:var(--amarillo);}

.vt{display:none;flex:1;overflow-y:auto;padding:20px;}
.vt.visible{display:block;}
.vm{display:none;flex:1;overflow:hidden;}
.vm.visible{display:flex;}
#mapa{flex:1;}

.mp{width:295px;min-width:295px;background:var(--gris-oscuro);border-left:1px solid var(--borde);overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:9px;}
.mp-hint{font-family:var(--font-mono);font-size:11px;color:var(--texto-dim);text-align:center;padding:28px 8px;line-height:1.8;}

.cw label{font-family:var(--font-mono);font-size:9px;color:var(--texto-dim);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:4px;}
select.cs{width:100%;background:var(--gris-medio);border:1px solid var(--borde);color:var(--texto);font-family:var(--font-mono);font-size:11px;padding:6px 9px;border-radius:4px;cursor:pointer;}
select.cs:focus{outline:2px solid var(--amarillo);}

.rcn{font-family:var(--font-display);font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px;}
.rcm{font-family:var(--font-mono);font-size:10px;color:var(--texto-dim);margin-bottom:9px;}
.rcm em{color:var(--amarillo);font-style:normal;}

.sm{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px;}
.smc{background:var(--gris-medio);border-radius:4px;padding:6px 8px;}
.smc .l{font-family:var(--font-mono);font-size:9px;color:var(--texto-dim);text-transform:uppercase;}
.smc .v{font-family:var(--font-display);font-size:14px;font-weight:700;}
.smc .p{font-family:var(--font-mono);font-size:9px;color:var(--amarillo);}

.ar{margin-bottom:9px;}
.al{font-family:var(--font-mono);font-size:9px;color:var(--texto-dim);margin-bottom:3px;}
.ab{background:var(--gris-medio);border-radius:3px;height:4px;overflow:hidden;}
.af{height:100%;background:var(--amarillo);border-radius:3px;}

.bt{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--texto-dim);text-transform:uppercase;margin-bottom:7px;}
.bi{display:grid;grid-template-columns:74px 1fr 44px;align-items:center;gap:6px;margin-bottom:4px;}
.bs{font-family:var(--font-mono);font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;}
.btr{height:13px;background:var(--gris-medio);border-radius:2px;overflow:hidden;}
.bf{height:100%;border-radius:2px;min-width:2px;}
.bp{font-family:var(--font-mono);font-size:9px;color:var(--texto-dim);}

.mf{position:absolute;top:10px;left:10px;z-index:999;display:flex;gap:5px;flex-wrap:wrap;}
.fs{background:rgba(13,13,13,.93);border:1px solid rgba(255,255,255,.15);color:var(--texto);font-family:var(--font-mono);font-size:10px;padding:5px 8px;border-radius:4px;cursor:pointer;min-width:115px;}
.fs:focus{outline:1px solid var(--amarillo);}

.ml{position:absolute;bottom:20px;left:10px;z-index:999;background:rgba(13,13,13,.93);border:1px solid var(--borde);border-radius:5px;padding:8px 11px;max-width:175px;}
.lt{font-family:var(--font-mono);font-size:8px;letter-spacing:2px;color:var(--texto-dim);text-transform:uppercase;margin-bottom:6px;}
.li{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-family:var(--font-mono);font-size:9px;}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* Tabla */
.ph{margin-bottom:18px;}
.ph h2{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:4px;}
.sb{font-family:var(--font-mono);font-size:9px;letter-spacing:1px;background:var(--gris-medio);color:var(--texto-dim);padding:2px 6px;border-radius:2px;text-transform:uppercase;}
.sr{display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap;}
select{background:var(--gris-medio);border:1px solid var(--borde);color:var(--texto);font-family:var(--font-mono);font-size:11px;padding:6px 9px;border-radius:4px;cursor:pointer;min-width:165px;}
select:focus{outline:2px solid var(--amarillo);}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:18px;}
.sc2{background:var(--gris-oscuro);border:1px solid var(--borde);border-radius:5px;padding:10px 12px;}
.sc2 .sl{font-family:var(--font-mono);font-size:9px;color:var(--texto-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.sc2 .sv{font-family:var(--font-display);font-size:16px;font-weight:700;}
.sc2 .sp{font-family:var(--font-mono);font-size:10px;color:var(--amarillo);margin-top:1px;}
.rt{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--texto-dim);text-transform:uppercase;margin-bottom:10px;}
.bl{display:grid;grid-template-columns:90px 1fr 68px;align-items:center;gap:8px;margin-bottom:5px;}
.bsl{font-family:var(--font-mono);font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;}
.btl{height:17px;background:var(--gris-medio);border-radius:2px;overflow:hidden;}
.bfl{height:100%;border-radius:2px;min-width:2px;transition:width .5s;}
.bpl{font-family:var(--font-mono);font-size:10px;color:var(--texto-dim);}
.abl{background:var(--gris-medio);border-radius:3px;height:4px;margin:4px 0 12px;overflow:hidden;}
.afl{height:100%;background:var(--amarillo);border-radius:3px;}

.sp2{display:inline-block;width:12px;height:12px;border:2px solid var(--gris-claro);border-top-color:var(--amarillo);border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.est{font-family:var(--font-mono);font-size:11px;color:var(--texto-dim);padding:18px 0;text-align:center;}
.err{color:var(--rojo);}

.leaflet-container{background:#111;}
.leaflet-popup-content-wrapper{background:var(--gris-oscuro);border:1px solid var(--borde);color:var(--texto);font-family:var(--font-body);border-radius:5px;box-shadow:0 4px 20px rgba(0,0,0,.7);}
.leaflet-popup-tip{background:var(--gris-oscuro);}
.leaflet-popup-close-button{color:var(--texto-dim)!important;}

@media(max-width:680px){
  .layout{flex-direction:column;}
  nav{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--borde);display:flex;overflow-x:auto;padding:6px 0;}
  .mp{width:100%;min-width:unset;max-height:250px;border-left:none;border-top:1px solid var(--borde);}
  .vm{flex-direction:column;}
}
</style>
</head>
<body>

<header>
  <div class="ht">Elecciones Subnacionales<br><span>La Paz 2026</span></div>
  <div class="hm" id="hm">Fuente: <strong>OEP · SIREPRE</strong></div>
</header>

<div class="layout">
  <nav>
    <h3>Cargos</h3>
    <button class="nb active" data-cargo="gobernador" onclick="selCargo(this)">Gobernador/a</button>
    <button class="nb" data-cargo="asambleista_poblacion" onclick="selCargo(this)">Asamb. Población</button>
    <button class="nb" data-cargo="asambleista_territorio" onclick="selCargo(this)">Asamb. Territorio</button>
    <button class="nb" data-cargo="alcalde" onclick="selCargo(this)">Alcalde/sa</button>
    <button class="nb" data-cargo="concejal" onclick="selCargo(this)">Concejales</button>
  </nav>

  <main>
    <div class="tabs">
      <button class="tb active" id="tt" onclick="selTab('tabla')">📊 Resultados</button>
      <button class="tb" id="tm" onclick="selTab('mapa')">🗺 Mapa por recinto</button>
    </div>

    <div class="vt visible" id="vt">
      <div id="tc"><div class="est"><span class="sp2"></span>Cargando…</div></div>
    </div>

    <div class="vm" id="vm">
      <div style="position:relative;flex:1;display:flex;flex-direction:column;">
        <div id="mapa" style="flex:1;"></div>
        <div class="mf" id="mf" style="display:none">
          <select class="fs" id="fp" onchange="filtrarMapa()"><option value="">Todas las provincias</option></select>
          <select class="fs" id="fm" onchange="filtrarMapa()"><option value="">Todos los municipios</option></select>
        </div>
        <div class="ml" id="mleg" style="display:none">
          <div class="lt">Ganador por recinto</div>
          <div id="li"></div>
          <div class="li"><div class="ld" style="background:#444;border:1px solid #666"></div>Sin datos</div>
        </div>
      </div>

      <div class="mp">
        <div class="cw">
          <label>Cargo visualizado</label>
          <select class="cs" id="mc" onchange="cambiarCargoMapa()">
            <option value="gobernador">Gobernador/a</option>
            <option value="asambleista_poblacion">Asamb. Población</option>
            <option value="asambleista_territorio">Asamb. Territorio</option>
            <option value="alcalde">Alcalde/sa</option>
            <option value="concejal">Concejales</option>
          </select>
        </div>
        <div class="mp-hint" id="mhint">← Haz click en un punto del mapa para ver los resultados del recinto</div>
        <div id="rdet" style="display:none">
          <div class="rcn" id="rcn"></div>
          <div class="rcm" id="rcm"></div>
          <div class="ar" id="rca" style="display:none"><div class="al" id="rcal"></div><div class="ab"><div class="af" id="rcaf" style="width:0"></div></div></div>
          <div class="sm" id="rcs"></div>
          <div class="bt">Resultados por organización</div>
          <div id="rcb"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const BASE='./resultados';
const CARGOS={
  gobernador:            {titulo:'Gobernador / Gobernadora',         nivel:'departamento',ct:4},
  asambleista_poblacion: {titulo:'Asambleísta Dpto. por Población',  nivel:'departamento',ct:8},
  asambleista_territorio:{titulo:'Asambleísta Dpto. por Territorio', nivel:'provincia',   ct:7},
  alcalde:               {titulo:'Alcalde / Alcaldesa',               nivel:'municipio',   ct:13},
  concejal:              {titulo:'Concejales',                        nivel:'municipio',   ct:14},
};
const COLS={'PATRIA-SOL':'#d4b800','NGP':'#e05070','MTS':'#e060a0','IH':'#80c0e0','VENCEREMOS':'#00c0c0','UPC':'#a0e0b0','ASLP':'#60c0ff','VIDA':'#4090e0','LIBRE':'#f0a040','PDC':'#c8a040','M.P.S.':'#a060c0','JALLALLA LP':'#f08080','A-UPP':'#e0c040','APB-SUMATE':'#b0b0b0','ASP':'#e04040','FRI':'#8080e0','SPBC':'#e8e0b0'};
function cp(s){if(!s)return'#444';const u=s.toUpperCase();for(const[k,v]of Object.entries(COLS))if(u.includes(k))return v;return'#667';}

let cargoA='gobernador',tabA='tabla',cache={},mapaOk=false,L_mapa=null,rdatos=null,capaM=null,todosM=[],legC={};

function selCargo(btn){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  cargoA=btn.dataset.cargo;
  document.getElementById('mc').value=cargoA;
  if(tabA==='tabla')renderTabla();else{legC={};actualizarLeg();cerrarDet();dibujarMapa();}
}
function selTab(tab){
  tabA=tab;
  document.getElementById('tt').classList.toggle('active',tab==='tabla');
  document.getElementById('tm').classList.toggle('active',tab==='mapa');
  document.getElementById('vt').classList.toggle('visible',tab==='tabla');
  document.getElementById('vm').classList.toggle('visible',tab==='mapa');
  if(tab==='tabla'&&!cache['__t_'+cargoA])renderTabla();
  if(tab==='mapa'&&!mapaOk)iniciarMapa();
}
function cambiarCargoMapa(){
  cargoA=document.getElementById('mc').value;
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.cargo===cargoA));
  legC={};actualizarLeg();cerrarDet();dibujarMapa();
}

async function cargar(a){if(cache[a])return cache[a];const r=await fetch(`${BASE}/${a}.json`);if(!r.ok)throw new Error('HTTP '+r.status);cache[a]=await r.json();return cache[a];}
function fmt(n){return n==null?'–':Number(n).toLocaleString('es-BO');}

function barrasLg(g){
  if(!g?.length)return'<div class="est">Sin datos</div>';
  const mx=Math.max(...g.map(x=>x.porcien||0));
  return g.filter(x=>x.sigla).sort((a,b)=>(b.porcien||0)-(a.porcien||0)).map(x=>`
    <div class="bl"><span class="bsl" title="${x.nombre||''}">${x.sigla}</span>
    <div class="btl"><div class="bfl" style="width:${mx>0?(x.porcien/mx*100):0}%;background:${x.color||cp(x.sigla)}"></div></div>
    <span class="bpl">${(x.porcien||0).toFixed(2)}%</span></div>`).join('');
}
function tabStats(t){
  if(!t)return'';
  const ac=t.find(x=>x.nombre==='Total Actas Computadas'),ha=t.find(x=>x.nombre==='Total Actas Habilitadas');
  const pc=(ac&&ha&&ha.valor>0)?(ac.valor/ha.valor*100).toFixed(1):null;
  const ds=[{l:'Votos Válidos',k:'Votos Válidos'},{l:'Votos Blancos',k:'Votos Blancos'},{l:'Votos Nulos',k:'Total Votos Nulos'},{l:'Votos Emitidos',k:'Votos Emitidos'}];
  const cs=ds.map(s=>{const r=t.find(x=>x.nombre===s.k);return r?`<div class="sc2"><div class="sl">${s.l}</div><div class="sv">${fmt(r.valor)}</div>${r.porcentaje!=null?`<div class="sp">${r.porcentaje}%</div>`:''}</div>`:''}).join('');
  return(pc!=null?`<div style="margin-bottom:15px"><div style="font-family:var(--font-mono);font-size:10px;color:var(--texto-dim)">ACTAS: <strong style="color:var(--amarillo)">${fmt(ac.valor)} / ${fmt(ha.valor)}</strong> (${pc}%)</div><div class="abl"><div class="afl" style="width:${pc}%"></div></div></div>`:'')+`<div class="sg">${cs}</div>`;
}

async function renderTabla(){
  const el=document.getElementById('tc');const cfg=CARGOS[cargoA];cache['__t_'+cargoA]=true;
  el.innerHTML=`<div class="est"><span class="sp2"></span>Cargando…</div>`;
  try{
    const j=await cargar(cargoA);
    if(cfg.nivel==='departamento'){
      el.innerHTML=`<div class="ph"><h2>${cfg.titulo}</h2><span class="sb">Departamento La Paz</span></div>${tabStats(j.data.tabla)}<div class="rt">Resultados por organización política</div>${barrasLg(j.data.grafica)}`;
    }else if(cfg.nivel==='provincia'){
      const ps=Object.keys(j.provincias);
      window._rp=n=>tabStats(j.provincias[n]?.data?.tabla)+'<div class="rt">Resultados</div>'+barrasLg(j.provincias[n]?.data?.grafica);
      el.innerHTML=`<div class="ph"><h2>${cfg.titulo}</h2><span class="sb">Por provincia</span></div><div class="sr"><select id="sp" onchange="document.getElementById('sc').innerHTML=_rp(this.value)">${ps.map(p=>`<option>${p}</option>`).join('')}</select></div><div id="sc">${window._rp(ps[0])}</div>`;
    }else{
      const ms=Object.keys(j.municipios);const bp={};
      ms.forEach(k=>{const p=j.municipios[k].provincia;if(!bp[p])bp[p]=[];bp[p].push(k);});
      const ps=Object.keys(bp).sort();
      window._rm=k=>tabStats(j.municipios[k]?.data?.tabla)+'<div class="rt">Resultados</div>'+barrasLg(j.municipios[k]?.data?.grafica);
      window._mo=p=>bp[p].map(k=>`<option value="${k}">${k.split(' / ')[1]||k}</option>`).join('');
      el.innerHTML=`<div class="ph"><h2>${cfg.titulo}</h2><span class="sb">Por municipio</span></div><div class="sr"><select id="sp2" onchange="document.getElementById('sm2').innerHTML=_mo(this.value);document.getElementById('mc2').innerHTML=_rm(document.getElementById('sm2').value)">${ps.map(p=>`<option>${p}</option>`).join('')}</select><select id="sm2" onchange="document.getElementById('mc2').innerHTML=_rm(this.value)">${window._mo(ps[0])}</select></div><div id="mc2">${window._rm(bp[ps[0]][0])}</div>`;
    }
  }catch(e){el.innerHTML=`<div class="est err">Error al cargar: ${e.message}</div>`;}
}

async function iniciarMapa(){
  mapaOk=true;
  L_mapa=L.map('mapa',{zoomControl:true,preferCanvas:true}).setView([-16.5,-68.15],9);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19}).addTo(L_mapa);

  try{
    // Intentar cargar recintos_resultados.json (con datos del OEP por recinto)
    const r=await fetch(`${BASE}/recintos_resultados.json`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    rdatos=await r.json();
    if(rdatos.actualizado){
      const d=new Date(rdatos.actualizado);
      document.getElementById('hm').innerHTML=`Fuente: <strong>OEP · SIREPRE</strong><br>Actualizado: <strong>${d.toLocaleString('es-BO',{timeZone:'America/La_Paz'})}</strong>`;
    }
  }catch(e){
    // Fallback: recintos.json base (sin resultados - solo puntos en el mapa)
    try{
      const r2=await fetch(`${BASE}/recintos.json`);
      if(!r2.ok)throw new Error('HTTP '+r2.status);
      const base=await r2.json();
      rdatos={recintos:{}};
      base.recintos.forEach(rc=>{rdatos.recintos[`${rc.locality_id}-${rc.recinto_id}`]={...rc,gobernador:null};});
      document.getElementById('mhint').innerHTML='← Los puntos aparecen sin color porque <strong>recintos_resultados.json</strong> aún no fue generado.<br><br>Se generará en la próxima ejecución del workflow de GitHub Actions.';
    }catch(e2){
      document.getElementById('mhint').innerHTML='<span style="color:var(--rojo)">No se encontró recintos.json en /resultados/<br>Sube el archivo recintos.json a esa carpeta.</span>';
      return;
    }
  }

  // Poblar filtro provincias
  const provs=[...new Set(Object.values(rdatos.recintos).map(r=>r.provincia))].sort();
  const fp=document.getElementById('fp');
  provs.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;fp.appendChild(o);});

  document.getElementById('mf').style.display='flex';
  document.getElementById('mleg').style.display='block';
  dibujarMapa();
}

function dibujarMapa(){
  if(!L_mapa||!rdatos)return;
  if(capaM)L_mapa.removeLayer(capaM);
  capaM=L.layerGroup().addTo(L_mapa);
  todosM=[];

  const pF=document.getElementById('fp')?.value||'';
  const mF=document.getElementById('fm')?.value||'';

  Object.entries(rdatos.recintos).forEach(([key,rec])=>{
    if(pF&&rec.provincia!==pF)return;
    if(mF&&rec.municipio!==mF)return;

    // Determinar color ganador
    const dato=rec[cargoA]||rec.gobernador;
    const graf=dato?.grafica||dato?.data?.grafica||[];
    let gSigla=null,gColor='#444';
    if(graf.length>0){
      const g=[...graf].sort((a,b)=>(b.porcien||0)-(a.porcien||0))[0];
      gSigla=g.sigla;gColor=g.color||cp(g.sigla);
      if(gSigla&&!legC[gSigla]){legC[gSigla]=gColor;actualizarLeg();}
    }

    const radio=Math.max(4,Math.min(9,4+(rec.mesas||1)*.25));
    const m=L.circleMarker([rec.lat,rec.lon],{
      radius:radio,fillColor:gColor,color:gColor==='#444'?'#555':'rgba(255,255,255,0.6)',
      weight:gColor==='#444'?1:1.2,opacity:.9,fillOpacity:.82
    }).addTo(capaM);
    m._rec=rec;m._key=key;
    m.on('click',()=>mostrarDet(rec,m));
    todosM.push(m);
  });
}

function filtrarMapa(){
  const p=document.getElementById('fp').value;
  const fm=document.getElementById('fm');
  const ms=[...new Set(Object.values(rdatos.recintos).filter(r=>!p||r.provincia===p).map(r=>r.municipio))].sort();
  fm.innerHTML='<option value="">Todos los municipios</option>';
  ms.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;fm.appendChild(o);});
  dibujarMapa();
  const f=Object.values(rdatos.recintos).filter(r=>(!p||r.provincia===p)&&(!fm.value||r.municipio===fm.value));
  if(f.length>0&&p){const la=f.map(r=>r.lat),lo=f.map(r=>r.lon);L_mapa.fitBounds([[Math.min(...la),Math.min(...lo)],[Math.max(...la),Math.max(...lo)]],{padding:[40,40]});}
}

function mostrarDet(rec,marcador){
  todosM.forEach(m=>m.setStyle({weight:m===marcador?2.5:1.2,color:m===marcador?'#fff':'rgba(255,255,255,0.6)'}));
  document.getElementById('mhint').style.display='none';
  document.getElementById('rdet').style.display='block';
  document.getElementById('rcn').textContent=rec.nombre;
  document.getElementById('rcm').innerHTML=`${rec.municipio} · ${rec.provincia}<br><em>${rec.mesas} mesas · ${(rec.inscritos||0).toLocaleString('es-BO')} inscritos</em>`;

  const dato=rec[cargoA]||rec.gobernador;
  if(!dato){
    document.getElementById('rca').style.display='none';
    document.getElementById('rcs').innerHTML='';
    document.getElementById('rcb').innerHTML='<div class="est" style="font-size:10px">Sin resultados para este recinto</div>';
    return;
  }

  const tabla=dato?.tabla||dato?.data?.tabla||null;
  const graf=dato?.grafica||dato?.data?.grafica||[];

  if(tabla){
    const ac=tabla.find(t=>t.nombre==='Total Actas Computadas'),ha=tabla.find(t=>t.nombre==='Total Actas Habilitadas');
    const pc=(ac&&ha&&ha.valor>0)?(ac.valor/ha.valor*100).toFixed(1):null;
    if(pc!=null){document.getElementById('rca').style.display='block';document.getElementById('rcal').textContent=`Actas: ${ac.valor} / ${ha.valor}  (${pc}%)`;document.getElementById('rcaf').style.width=pc+'%';}
    else document.getElementById('rca').style.display='none';
    const ds=[{l:'Válidos',k:'Votos Válidos'},{l:'Emitidos',k:'Votos Emitidos'},{l:'Blancos',k:'Votos Blancos'},{l:'Nulos',k:'Total Votos Nulos'}];
    document.getElementById('rcs').innerHTML=ds.map(s=>{const r=tabla.find(t=>t.nombre===s.k);return r?`<div class="smc"><div class="l">${s.l}</div><div class="v">${fmt(r.valor)}</div>${r.porcentaje!=null?`<div class="p">${r.porcentaje}%</div>`:''}</div>`:''}).join('');
  }else{document.getElementById('rca').style.display='none';document.getElementById('rcs').innerHTML='';}

  if(graf.length>0){
    const mx=Math.max(...graf.map(g=>g.porcien||0));
    document.getElementById('rcb').innerHTML=[...graf].filter(g=>g.sigla).sort((a,b)=>(b.porcien||0)-(a.porcien||0)).map(g=>`
      <div class="bi"><span class="bs" title="${g.nombre||g.sigla}">${g.sigla}</span>
      <div class="btr"><div class="bf" style="width:${mx>0?(g.porcien/mx*100):0}%;background:${g.color||cp(g.sigla)}"></div></div>
      <span class="bp">${(g.porcien||0).toFixed(2)}%</span></div>`).join('');
  }else{document.getElementById('rcb').innerHTML='<div class="est" style="font-size:10px">Sin datos de candidaturas</div>';}
}

function cerrarDet(){document.getElementById('mhint').style.display='block';document.getElementById('rdet').style.display='none';}
function actualizarLeg(){document.getElementById('li').innerHTML=Object.entries(legC).map(([s,c])=>`<div class="li"><div class="ld" style="background:${c}"></div>${s}</div>`).join('');}

async function cargarMeta(){
  try{const m=await cargar('meta');const d=m.actualizado?new Date(m.actualizado):null;document.getElementById('hm').innerHTML=`Fuente: <strong>OEP · SIREPRE</strong>${d?`<br>Actualizado: <strong>${d.toLocaleString('es-BO',{timeZone:'America/La_Paz'})}</strong>`:''}`;}catch(e){}
}

renderTabla();
cargarMeta();
</script>
